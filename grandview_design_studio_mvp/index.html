<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grandview Fence Design Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand__logo" src="assets/logo.png" alt="Grandview Fence" />
      <div class="brand__text">
        <div class="brand__sub">Design Studio</div>
      </div>
    </div>

    <div class="topbar__actions">
      <button id="resetViewBtn" class="btn btn--ghost" type="button">Reset</button>
      <button id="downloadBtn" class="btn" type="button">Save Image</button>
    </div>
  </header>

  <main class="layout">
    <aside class="panel">
      <section class="panel__section">
        <h3>Scene</h3>
        <select id="modeSelect" class="select"></select>
      </section>

      <section id="fenceSceneSection" class="panel__section">
        <h3>Fence View</h3>
        <div id="sceneButtons" class="segmented"></div>
      </section>

      <section class="panel__section">
        <h3 id="styleHeader">Fence Style</h3>
        <select id="styleSelect" class="select"></select>
      </section>
    </aside>

    <section class="stageWrap">
      <div class="stageHeader">
        <div class="stageHeader__left">Preview</div>
        <div class="stageHeader__right"><span id="status"></span></div>
      </div>

      <div class="stage">
        <canvas id="canvas" width="1960" height="1096"></canvas>
        <iframe id="gateIframe" title="Grandview Gate Studio" src="gate_tool.html"></iframe>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
